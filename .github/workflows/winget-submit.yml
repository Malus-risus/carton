name: Submit carton to WinGet

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to submit. Leave empty to use the latest stable release.'
        required: false
        type: string
  workflow_run:
    workflows:
      - 'Build & Publish carton'
      - 'Build & Publish carton (Direct Release Upload)'
    types:
      - completed

permissions:
  contents: read

env:
  APP_NAME: carton
  PACKAGE_IDENTIFIER: Unifan.Carton
  WINGET_MANIFEST_PATH: manifests/u/Unifan/Carton

jobs:
  submit:
    name: Submit WinGet manifest
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          $ErrorActionPreference = "Stop"

          $headers = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
            "User-Agent" = "carton-winget-submit"
          }

          function Invoke-GitHubApi {
            param([Parameter(Mandatory = $true)][string]$Uri)
            Invoke-RestMethod -Headers $headers -Uri $Uri
          }

          function Set-EnvValue {
            param(
              [Parameter(Mandatory = $true)][string]$Name,
              [Parameter(Mandatory = $true)][string]$Value
            )
            "$Name=$Value" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          $repo = $env:GITHUB_REPOSITORY
          $tag = $env:TAG_INPUT
          $release = $null

          if (-not [string]::IsNullOrWhiteSpace($tag)) {
            $encodedTag = [System.Uri]::EscapeDataString($tag)
            $release = Invoke-GitHubApi "https://api.github.com/repos/$repo/releases/tags/$encodedTag"
          } elseif (-not [string]::IsNullOrWhiteSpace($env:WORKFLOW_RUN_HEAD_SHA)) {
            $releases = Invoke-GitHubApi "https://api.github.com/repos/$repo/releases?per_page=20"
            $release = $releases |
              Where-Object {
                -not $_.draft -and
                -not $_.prerelease -and
                (
                  $_.target_commitish -eq $env:WORKFLOW_RUN_HEAD_SHA -or
                  $_.tag_name -eq $env:WORKFLOW_RUN_HEAD_BRANCH
                )
              } |
              Select-Object -First 1

            if (-not $release) {
              Write-Host "No stable release points at this publishing workflow run. Skipping WinGet submission."
              Set-EnvValue "SHOULD_SUBMIT" "false"
              exit 0
            }
          } else {
            $release = Invoke-GitHubApi "https://api.github.com/repos/$repo/releases/latest"
          }

          if ($release.draft -or $release.prerelease) {
            Write-Host "Release $($release.tag_name) is draft or prerelease. Skipping WinGet submission."
            Set-EnvValue "SHOULD_SUBMIT" "false"
            exit 0
          }

          $tagName = $release.tag_name
          if ([string]::IsNullOrWhiteSpace($tagName)) {
            throw "Could not resolve a release tag."
          }

          $version = $tagName
          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }

          $manifestUri = "https://api.github.com/repos/microsoft/winget-pkgs/contents/$($env:WINGET_MANIFEST_PATH)/$version`?ref=master"
          try {
            Invoke-GitHubApi $manifestUri | Out-Null
            Write-Host "WinGet already has $($env:PACKAGE_IDENTIFIER) $version. Skipping submission."
            Set-EnvValue "SHOULD_SUBMIT" "false"
            exit 0
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -ne 404) {
              throw
            }
          }

          $assetNames = @{
            x64 = "$($env:APP_NAME)-$version-win-x64-Setup.exe"
            arm64 = "$($env:APP_NAME)-$version-win-arm64-Setup.exe"
          }

          $assets = @($release.assets)
          $x64Asset = $assets | Where-Object { $_.name -eq $assetNames.x64 } | Select-Object -First 1
          $arm64Asset = $assets | Where-Object { $_.name -eq $assetNames.arm64 } | Select-Object -First 1

          if (-not $x64Asset -or -not $arm64Asset) {
            $availableAssets = ($assets | ForEach-Object { $_.name }) -join ", "
            throw "Expected installer assets were not found. Need '$($assetNames.x64)' and '$($assetNames.arm64)'. Available assets: $availableAssets"
          }

          $releaseDate = ([datetimeoffset]$release.published_at).UtcDateTime.ToString("yyyy-MM-dd")

          Set-EnvValue "SHOULD_SUBMIT" "true"
          Set-EnvValue "PACKAGE_VERSION" $version
          Set-EnvValue "RELEASE_DATE" $releaseDate
          Set-EnvValue "RELEASE_NOTES_URL" $release.html_url
          Set-EnvValue "INSTALLER_X64_URL" "$($x64Asset.browser_download_url)|x64"
          Set-EnvValue "INSTALLER_ARM64_URL" "$($arm64Asset.browser_download_url)|arm64"

          Write-Host "Resolved $($env:PACKAGE_IDENTIFIER) $version from $tagName."

      - name: Validate WinGet token
        if: env.SHOULD_SUBMIT == 'true'
        shell: pwsh
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_GITHUB_TOKEN)) {
            throw "Missing repository secret WINGET_GITHUB_TOKEN. Create a GitHub PAT (classic) with public_repo scope and save it as this secret."
          }

      - name: Setup .NET runtime
        if: env.SHOULD_SUBMIT == 'true'
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 6.0.x

      - name: Download WingetCreate
        if: env.SHOULD_SUBMIT == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          curl.exe -L --fail --silent --show-error https://aka.ms/wingetcreate/latest --output wingetcreate.exe

      - name: Submit manifest
        if: env.SHOULD_SUBMIT == 'true'
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $urls = @(
            $env:INSTALLER_X64_URL,
            $env:INSTALLER_ARM64_URL
          )

          .\wingetcreate.exe update $env:PACKAGE_IDENTIFIER `
            --urls $urls `
            --version $env:PACKAGE_VERSION `
            --release-date $env:RELEASE_DATE `
            --release-notes-url $env:RELEASE_NOTES_URL `
            --submit `
            --prtitle "Update $env:PACKAGE_IDENTIFIER to $env:PACKAGE_VERSION" `
            --no-open
